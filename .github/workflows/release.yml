name: release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changelog:
    name: generate release notes
    runs-on: ubuntu-latest
    outputs:
      notes: ${{ steps.cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Generate notes with git-cliff
        id: cliff
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

  images:
    name: build ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: changelog
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: docker/Dockerfile
            target: api
            title: ocidex-api
            description: OCIDex API server (HTTP, OAuth, search, ingestion)
          - name: scanner-worker
            dockerfile: docker/Dockerfile
            target: scanner-worker
            title: ocidex-scanner-worker
            description: OCIDex scanner worker (OCI registry walk and SBOM extraction via syft)
          - name: enrichment-worker
            dockerfile: docker/Dockerfile
            target: enrichment-worker
            title: ocidex-enrichment-worker
            description: OCIDex enrichment worker (SBOM post-processing pipeline)
          - name: web
            dockerfile: docker/web/Dockerfile
            target: ""
            title: ocidex-web
            description: OCIDex SolidJS frontend served by nginx
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build metadata
        id: vars
        run: echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ocidex-${{ matrix.name }}
          # type=semver gives vX.Y.Z, X.Y, X. type=raw gives 'latest' only for stable releases.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.vendor=pfenerty
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}/blob/main/README.md
            org.opencontainers.image.version=${{ github.ref_name }}
          annotations: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.vendor=pfenerty
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}/blob/main/README.md
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.vars.outputs.date }}
          cache-from: type=gha,scope=release-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.name }}

  publish:
    name: publish github release
    runs-on: ubuntu-latest
    needs: [changelog, images]
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ needs.changelog.outputs.notes }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          draft: false
