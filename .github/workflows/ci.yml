name: CI

on:
    push:
        branches: ["**"]
    pull_request:
        branches: ["**"]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    changes:
        name: Detect changes
        runs-on: ubuntu-latest
        outputs:
            go: ${{ steps.filter.outputs.go }}
            web: ${{ steps.filter.outputs.web }}
            docker-api: ${{ steps.filter.outputs.docker-api }}
            docker-web: ${{ steps.filter.outputs.docker-web }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
              id: filter
              with:
                  filters: |
                      go:
                        - '**/*.go'
                        - 'go.mod'
                        - 'go.sum'
                        - '.golangci.yml'
                        - 'db/**'
                      web:
                        - 'web/**'
                      docker-api:
                        - 'docker/api/**'
                        - '**/*.go'
                        - 'go.mod'
                        - 'go.sum'
                      docker-web:
                        - 'docker/web/**'
                        - 'web/**'

    go-format:
        name: Go / Format
        needs: changes
        if: needs.changes.outputs.go == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
              with:
                  go-version: "1.25.x"
                  cache: true
            - name: Check formatting
              run: |
                  unformatted=$(gofmt -l .)
                  if [ -n "$unformatted" ]; then
                    echo "The following files are not formatted:"
                    echo "$unformatted"
                    gofmt -d .
                    exit 1
                  fi

    go-lint:
        name: Go / Lint
        needs: changes
        if: needs.changes.outputs.go == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
              with:
                  go-version: "1.25.x"
                  cache: true
            - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
              with:
                  version: v2.11.4

    go-test:
        name: Go / Test
        needs: changes
        if: needs.changes.outputs.go == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
              with:
                  go-version: "1.25.x"
                  cache: true
            - name: Test
              run: go test -v -race -short -coverprofile=coverage.out -covermode=atomic ./...
            - uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
              with:
                  files: ./coverage.out
                  flags: unit

    go-build:
        name: Go / Build
        needs: changes
        if: needs.changes.outputs.go == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
              with:
                  go-version: "1.25.x"
                  cache: true
            - name: Build
              run: make build

    integration:
        name: Go / Integration tests
        needs: [changes, go-test]
        if: needs.changes.outputs.go == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
              with:
                  go-version: "1.25.x"
                  cache: true
            - name: Integration tests
              run: go test -v -race ./tests/...

    openapi-check:
        name: Go / OpenAPI check
        needs: changes
        if: needs.changes.outputs.go == 'true' || needs.changes.outputs.web == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
              with:
                  go-version: "1.25.x"
                  cache: true
            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: "22"
                  cache: npm
                  cache-dependency-path: web/package-lock.json
            - name: Install frontend deps
              run: cd web && npm ci
            - name: Check OpenAPI spec is up to date
              run: make openapi-check

    frontend-lint:
        name: Frontend / Lint
        needs: changes
        if: needs.changes.outputs.web == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: "22"
                  cache: npm
                  cache-dependency-path: web/package-lock.json
            - name: Install deps
              run: cd web && npm ci
            - name: Lint
              run: make frontend-lint

    frontend-build:
        name: Frontend / Build
        needs: changes
        if: needs.changes.outputs.web == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: "22"
                  cache: npm
                  cache-dependency-path: web/package-lock.json
            - name: Install deps
              run: cd web && npm ci
            - name: Build
              run: cd web && npm run build

    docker-api:
        name: Docker / API image
        needs: [changes, go-build]
        if: needs.changes.outputs.docker-api == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
            - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
              with:
                  context: .
                  file: docker/api/Dockerfile
                  push: false
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    docker-web:
        name: Docker / Web image
        needs: [changes, frontend-build]
        if: needs.changes.outputs.docker-web == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
            - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
              with:
                  context: .
                  file: docker/web/Dockerfile
                  push: false
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    dependency-review:
        name: Dependency review
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
