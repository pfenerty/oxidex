apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ocidex-go-fmt
  namespace: ocidex-ci
spec:
  params:
    - name: repo-full-name
      type: string
    - name: revision
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - image: ghcr.io/pfenerty/apko-cicd/golang:1.25
      name: fmt
      onError: continue
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        def run_and_save [prev_ec: int, ...args: string] {
            try { run-external ...$args } catch { null }
            let ec = $env.LAST_EXIT_CODE
            let worst = if $prev_ec != 0 { $prev_ec } else { $ec }
            $"($worst)" | save -f /tekton/home/.exit-code
            $worst
        }

        log "Checking gofmt"
        let result = (^gofmt -l . | complete)
        let ec = if ($result.stdout | str trim | str length) > 0 {
            print "Unformatted files:"; print $result.stdout; 1
        } else { 0 }
        $"($ec)" | save -f /tekton/home/.exit-code
        log (if $ec == 0 { "OK: all files formatted" } else { "FAIL: formatting issues found" })
        exit $ec
    - env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-token
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: report-status
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] {
          print $"[(date now | format date '%H:%M:%S')] report-status [go-fmt]: ($msg)"
        }

        let exit_code = (try { open --raw /tekton/home/.exit-code | str trim | into int } catch { 1 })
        let state = if $exit_code == 0 { "success" } else { "failure" }
        let desc = if $exit_code == 0 { "Passed" } else { "Failed" }

        log $"exit-code=($exit_code) state=($state)"

        let url = $"https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
        let body = { state: $state, context: "go-fmt", description: $desc }

        log $"POST ($url)"
        log $"body: ($body | to json -r)"

        try {
          http post $url $body -t application/json -H [
            Authorization $"token ($env.GITHUB_TOKEN)"
            Accept "application/vnd.github+json"
          ]
          log "done"
        } catch { |e|
          log $"error: ($e.msg)"
        }
  workspaces:
    - name: workspace
