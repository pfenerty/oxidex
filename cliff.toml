# git-cliff configuration. See https://git-cliff.org/docs/configuration.

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

Entries are generated by [git-cliff](https://git-cliff.org) from conventional commits.
Run `make release VERSION=vX.Y.Z` to cut a release.

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}]\
{% if previous and previous.version %} - {{ now() | date(format="%Y-%m-%d") }}{% endif %}
{% else %}\
## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
{{ commit.message | upper_first }}\
{% if commit.breaking %} [**breaking**]{% endif %}\
{% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^refactor", group = "<!-- 3 -->Refactor" },
  { message = "^docs", group = "<!-- 4 -->Documentation" },
  { message = "^test", group = "<!-- 5 -->Tests" },
  { message = "^ci", group = "<!-- 6 -->CI" },
  { message = "^build", group = "<!-- 7 -->Build" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(beads\\)", skip = true },
  { message = "^chore\\(deps\\)", skip = true },
  { message = "^chore", group = "<!-- 8 -->Chore" },
]
filter_commits = false
tag_pattern = "^v[0-9]+\\.[0-9]+\\.[0-9]+(-.+)?$"
topo_order = false
sort_commits = "oldest"
