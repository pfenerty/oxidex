run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - gosec
    - unconvert
    - goconst
    - gocyclo
    - bodyclose
    - dupl
    - durationcheck
    - errname
    - exhaustive
    - copyloopvar
    - gocritic
    - nilerr
    - noctx
    - prealloc
    - predeclared
    - usetesting
    - tparallel
    - unparam
    - whitespace

linters-settings:
  gocyclo:
    min-complexity: 15
  goconst:
    min-occurrences: 3
  govet:
    disable:
      - shadow
  revive:
    rules:
      - name: exported

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - gocyclo
        - errcheck
        - dupl
        - goconst
