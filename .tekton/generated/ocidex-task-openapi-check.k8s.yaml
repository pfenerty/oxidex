apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ocidex-openapi-check
  namespace: ocidex-ci
spec:
  params:
    - name: repo-full-name
      type: string
    - name: revision
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - image: alpine
      name: cache-restore-go-cache
      script: |-
        #!/bin/sh
        set -e
        HASH=$(cat $(workspaces.workspace.path)/go.sum | sha256sum | cut -c1-16)
        echo "$HASH" > /tekton/home/.cache-go-cache-hash
        ARCHIVE="$(workspaces.go-cache.path)/$HASH.tar.gz"
        if [ -f "$ARCHIVE" ]; then
          echo "cache hit ($HASH)"
          tar -xzf "$ARCHIVE"
        else
          echo "cache miss ($HASH)"
        fi
      workingDir: /
    - image: alpine
      name: cache-restore-node-cache
      script: |-
        #!/bin/sh
        set -e
        HASH=$(cat $(workspaces.workspace.path)/web/package-lock.json | sha256sum | cut -c1-16)
        echo "$HASH" > /tekton/home/.cache-node-cache-hash
        ARCHIVE="$(workspaces.node-cache.path)/$HASH.tar.gz"
        if [ -f "$ARCHIVE" ]; then
          echo "cache hit ($HASH)"
          tar -xzf "$ARCHIVE"
        else
          echo "cache miss ($HASH)"
        fi
      workingDir: /
    - args:
        - go run ./cmd/specgen > /tmp/openapi-check.json && diff web/openapi.json /tmp/openapi-check.json; EC=$?; echo $EC > /tekton/home/.exit-code; exit $EC
      command:
        - sh
        - -c
      image: docker.io/golang:1.25-bookworm
      name: check-spec
      onError: continue
    - args:
        - PREV_EC=$(cat /tekton/home/.exit-code); npm ci --ignore-scripts && npx openapi-typescript openapi.json -o /tmp/openapi-check.d.ts && diff src/types/openapi.d.ts /tmp/openapi-check.d.ts; EC=$?; if [ "$PREV_EC" -ne 0 ]; then EC=$PREV_EC; fi; echo $EC > /tekton/home/.exit-code; exit $EC
      command:
        - sh
        - -c
      image: docker.io/node:22-bookworm
      name: check-types
      onError: continue
      workingDir: $(workspaces.workspace.path)/web
    - image: alpine
      name: cache-save-go-cache
      onError: continue
      script: |-
        #!/bin/sh
        HASH=$(cat /tekton/home/.cache-go-cache-hash 2>/dev/null || echo "")
        [ -z "$HASH" ] && exit 0
        ARCHIVE="$(workspaces.go-cache.path)/$HASH.tar.gz"
        if [ ! -f "$ARCHIVE" ]; then
          echo "saving cache ($HASH)"
          tar -czf "$ARCHIVE" go/pkg/mod root/.cache/go-build
        fi
      workingDir: /
    - image: alpine
      name: cache-save-node-cache
      onError: continue
      script: |-
        #!/bin/sh
        HASH=$(cat /tekton/home/.cache-node-cache-hash 2>/dev/null || echo "")
        [ -z "$HASH" ] && exit 0
        ARCHIVE="$(workspaces.node-cache.path)/$HASH.tar.gz"
        if [ ! -f "$ARCHIVE" ]; then
          echo "saving cache ($HASH)"
          tar -czf "$ARCHIVE" root/.npm
        fi
      workingDir: /
    - args:
        - |-
          EXIT_CODE=$(cat /tekton/home/.exit-code)
          if [ "$EXIT_CODE" -eq 0 ]; then STATE=success DESC=Passed; else STATE=failure DESC=Failed; fi
          curl -fsS -X POST   -H "Authorization: token $GITHUB_TOKEN"   -H "Accept: application/vnd.github+json"   -H "Content-Type: application/json"   -d "{\"state\":\"$STATE\",\"context\":\"ocidex/openapi\",\"description\":\"$DESC\"}"   "https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
      command:
        - sh
        - -c
      env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-token
      image: cgr.dev/chainguard/curl:latest-dev
      name: report-status
  workspaces:
    - name: go-cache
    - name: node-cache
    - name: workspace
