apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ocidex-openapi-check
  namespace: ocidex-ci
spec:
  params:
    - name: repo-full-name
      type: string
    - name: revision
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - image: ghcr.io/pfenerty/apko-cicd/golang:1.25
      name: cache-restore-go-cache
      script: |-
        #!/usr/bin/env nu
        let hash = (["go.sum"] | each { |f| open $f } | str join | hash sha256 | str substring 0..15)
        $hash | save -f /tekton/home/.cache-go-cache-hash
        let archive = $"$(workspaces.go-cache.path)/($hash).tar.zst"
        if ($archive | path exists) {
          print $"cache hit ($hash)"
          ^tar --zstd -xf $archive
        } else {
          print $"cache miss ($hash)"
        }
      workingDir: $(workspaces.workspace.path)
    - image: ghcr.io/pfenerty/apko-cicd/nodejs:22
      name: cache-restore-node-cache
      script: |-
        #!/usr/bin/env nu
        let hash = (["web/package-lock.json"] | each { |f| open $f } | str join | hash sha256 | str substring 0..15)
        $hash | save -f /tekton/home/.cache-node-cache-hash
        let archive = $"$(workspaces.node-cache.path)/($hash).tar.zst"
        if ($archive | path exists) {
          print $"cache hit ($hash)"
          ^tar --zstd -xf $archive
        } else {
          print $"cache miss ($hash)"
        }
      workingDir: $(workspaces.workspace.path)
    - image: ghcr.io/pfenerty/apko-cicd/golang:1.25
      name: check-spec
      onError: continue
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        def run_and_save [prev_ec: int, ...args: string] {
            try { run-external ...$args } catch { null }
            let ec = $env.LAST_EXIT_CODE
            let worst = if $prev_ec != 0 { $prev_ec } else { $ec }
            $"($worst)" | save -f /tekton/home/.exit-code
            $worst
        }

        log "Generating OpenAPI spec"
        try { ^go run ./cmd/specgen out> /tmp/openapi-check.json } catch { null }
        let gen_ec = $env.LAST_EXIT_CODE
        if $gen_ec != 0 {
            $"($gen_ec)" | save -f /tekton/home/.exit-code
            log $"FAIL: specgen exit ($gen_ec)"
            exit $gen_ec
        }
        log "Diffing against committed spec"
        let ec = run_and_save 0 "diff" "web/openapi.json" "/tmp/openapi-check.json"
        log (if $ec == 0 { "OK: spec is up to date" } else { "FAIL: spec out of date" })
        exit $ec
    - image: ghcr.io/pfenerty/apko-cicd/nodejs:22
      name: check-types
      onError: continue
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        def run_and_save [prev_ec: int, ...args: string] {
            try { run-external ...$args } catch { null }
            let ec = $env.LAST_EXIT_CODE
            let worst = if $prev_ec != 0 { $prev_ec } else { $ec }
            $"($worst)" | save -f /tekton/home/.exit-code
            $worst
        }

        let prev_ec = (open /tekton/home/.exit-code | str trim | into int)
        log "Generating TypeScript types from spec"
        try { ^npx openapi-typescript openapi.json -o /tmp/openapi-check.d.ts } catch { null }
        let gen_ec = $env.LAST_EXIT_CODE
        if $gen_ec != 0 {
            let ec = if $prev_ec != 0 { $prev_ec } else { $gen_ec }
            $"($ec)" | save -f /tekton/home/.exit-code
            exit $ec
        }
        log "Diffing against committed types"
        let ec = run_and_save $prev_ec "diff" "src/types/openapi.d.ts" "/tmp/openapi-check.d.ts"
        log (if $ec == 0 { "OK: types up to date" } else { "FAIL: types out of date" })
        exit $ec
      workingDir: $(workspaces.workspace.path)/web
    - image: ghcr.io/pfenerty/apko-cicd/golang:1.25
      name: cache-save-go-cache
      onError: continue
      script: |-
        #!/usr/bin/env nu
        let hash = (try { open --raw /tekton/home/.cache-go-cache-hash | str trim } catch { "" })
        if ($hash | str length) == 0 { exit 0 }
        let archive = $"$(workspaces.go-cache.path)/($hash).tar.zst"
        if not ($archive | path exists) {
          print $"saving cache ($hash)"
          ^tar --zstd -cf $archive .gopath .gocache
        }
      workingDir: $(workspaces.workspace.path)
    - image: ghcr.io/pfenerty/apko-cicd/nodejs:22
      name: cache-save-node-cache
      onError: continue
      script: |-
        #!/usr/bin/env nu
        let hash = (try { open --raw /tekton/home/.cache-node-cache-hash | str trim } catch { "" })
        if ($hash | str length) == 0 { exit 0 }
        let archive = $"$(workspaces.node-cache.path)/($hash).tar.zst"
        if not ($archive | path exists) {
          print $"saving cache ($hash)"
          ^tar --zstd -cf $archive web/node_modules
        }
      workingDir: $(workspaces.workspace.path)
    - args:
        - |-
          EXIT_CODE=$(cat /tekton/home/.exit-code)
          if [ "$EXIT_CODE" -eq 0 ]; then STATE=success DESC=Passed; else STATE=failure DESC=Failed; fi
          curl -fsS -X POST   -H "Authorization: token $GITHUB_TOKEN"   -H "Accept: application/vnd.github+json"   -H "Content-Type: application/json"   -d "{\"state\":\"$STATE\",\"context\":\"ocidex/openapi\",\"description\":\"$DESC\"}"   "https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
      command:
        - sh
        - -c
      env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-token
      image: cgr.dev/chainguard/curl:latest-dev
      name: report-status
  workspaces:
    - name: go-cache
    - name: node-cache
    - name: workspace
