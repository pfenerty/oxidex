apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ocidex-go-test
  namespace: ocidex-ci
spec:
  params:
    - name: repo-full-name
      type: string
    - name: revision
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - image: ghcr.io/pfenerty/apko-cicd/golang:1.25
      name: test
      onError: continue
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        let packages = (^go list ./... | complete).stdout | lines | where ($it | str trim | str length) > 0
        log $"Testing ($packages | length) packages"
        mut ec = 0
        for pkg in $packages {
            log $"  running ($pkg)"
            let r = (^go test -v -race -short $pkg | complete)
            print $r.stdout
            if ($r.stderr | str trim | str length) > 0 { print $r.stderr }
            if $r.exit_code != 0 { $ec = $r.exit_code }
            log $"  done ($pkg) — exit ($r.exit_code)"
        }
        $"($ec)" | save -f /tekton/home/.exit-code
        log $"All packages done — exit ($ec)"
        exit $ec
    - args:
        - |-
          EXIT_CODE=$(cat /tekton/home/.exit-code)
          if [ "$EXIT_CODE" -eq 0 ]; then STATE=success DESC=Passed; else STATE=failure DESC=Failed; fi
          curl -fsS -X POST   -H "Authorization: token $GITHUB_TOKEN"   -H "Accept: application/vnd.github+json"   -H "Content-Type: application/json"   -d "{\"state\":\"$STATE\",\"context\":\"ocidex/test\",\"description\":\"$DESC\"}"   "https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
      command:
        - sh
        - -c
      env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-token
      image: cgr.dev/chainguard/curl:latest-dev
      name: report-status
  workspaces:
    - name: workspace
