apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ocidex-go-test
  namespace: ocidex-ci
spec:
  params:
    - name: repo-full-name
      type: string
    - name: revision
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "2"
        memory: 3Gi
      requests:
        cpu: 500m
        memory: 1Gi
    env:
      - name: GOPATH
        value: $(workspaces.workspace.path)/.gopath
      - name: GOCACHE
        value: $(workspaces.workspace.path)/.gocache
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - image: ghcr.io/pfenerty/apko-cicd/golang:1.25
      name: cache-restore-go-cache
      script: |-
        #!/usr/bin/env nu
        let hash = (["go.sum"] | each { |f| open --raw $f } | bytes collect | hash sha256 | str substring 0..15)
        $hash | save -f /tekton/home/.cache-go-cache-hash
        let archive = $"$(workspaces.go-cache.path)/($hash).tar.zst"
        if ($archive | path exists) {
          print $"cache hit ($hash)"
          ^tar --zstd -xf $archive
        } else {
          print $"cache miss ($hash)"
        }
      workingDir: $(workspaces.workspace.path)
    - image: ghcr.io/pfenerty/apko-cicd/golang:1.25
      name: test
      onError: continue
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        def run_and_save [prev_ec: int, ...args: string] {
            try { run-external ...$args } catch { null }
            let ec = $env.LAST_EXIT_CODE
            let worst = if $prev_ec != 0 { $prev_ec } else { $ec }
            $"($worst)" | save -f /tekton/home/.exit-code
            $worst
        }

        log "Running go test"
        let ec = run_and_save 0 "go" "test" "-v" "-race" "-short" "./..."
        log $"Exit code: ($ec)"
        exit $ec
    - image: ghcr.io/pfenerty/apko-cicd/golang:1.25
      name: cache-save-go-cache
      onError: continue
      script: |-
        #!/usr/bin/env nu
        let hash = (try { open --raw /tekton/home/.cache-go-cache-hash | str trim } catch { "" })
        if ($hash | str length) == 0 { exit 0 }
        let archive = $"$(workspaces.go-cache.path)/($hash).tar.zst"
        if not ($archive | path exists) {
          print $"saving cache ($hash)"
          ^tar --zstd -cf $archive .gopath .gocache
        }
      workingDir: $(workspaces.workspace.path)
    - args:
        - |-
          EXIT_CODE=$(cat /tekton/home/.exit-code)
          if [ "$EXIT_CODE" -eq 0 ]; then STATE=success DESC=Passed; else STATE=failure DESC=Failed; fi
          curl -fsS -X POST   -H "Authorization: token $GITHUB_TOKEN"   -H "Accept: application/vnd.github+json"   -H "Content-Type: application/json"   -d "{\"state\":\"$STATE\",\"context\":\"ocidex/test\",\"description\":\"$DESC\"}"   "https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
      command:
        - sh
        - -c
      env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-token
      image: cgr.dev/chainguard/curl:latest-dev
      name: report-status
  workspaces:
    - name: go-cache
    - name: workspace
