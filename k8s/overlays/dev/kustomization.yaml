apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - postgres.yaml
patches:
  # All Deployments: scale down to 1 replica for dev
  - path: patches/replicas.yaml
    target:
      kind: Deployment
  # NATS: single node, emptyDir storage, no cluster routing
  - path: patches/nats.yaml
    target:
      kind: StatefulSet
      name: nats
  # API Service: NodePort for local access
  - path: patches/api-service-nodeport.yaml
  # Per-deployment: IfNotPresent pull policy + NATS_STREAM_REPLICAS=1
  - path: patches/dev-env-api.yaml
  - path: patches/dev-env-scanner.yaml
  - path: patches/dev-env-enrichment.yaml
secretGenerator:
  - name: ocidex-secrets
    literals:
      - database-url=postgres://ocidex:devpass@postgres:5432/ocidex?sslmode=disable
      - github-client-id=dev-unused
      - github-client-secret=dev-unused
      - session-secret=dev-session-secret-not-for-production
generatorOptions:
  disableNameSuffixHash: true
