apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocidex-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ocidex-api
  template:
    metadata:
      labels:
        app: ocidex-api
    spec:
      terminationGracePeriodSeconds: 40
      containers:
        - name: ocidex-api
          image: ocidex-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          envFrom:
            - secretRef:
                name: ocidex-secrets
          env:
            - name: PORT
              value: "8080"
            - name: OCIDEX_MODE
              value: "distributed"
            - name: NATS_STREAM_REPLICAS
              value: "3"
            - name: NATS_URL
              value: "nats://nats:4222"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
