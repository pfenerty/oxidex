services:
    postgres:
        image: docker.io/postgres:15.4-alpine
        container_name: ocidex-postgres
        restart: always
        environment:
            POSTGRES_USER: ocidex
            POSTGRES_PASSWORD: ocidex
            POSTGRES_DB: ocidex
        volumes:
            - db-data:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ocidex"]
            interval: 5s
            timeout: 3s
            retries: 5

    nats:
        image: docker.io/nats:2-alpine
        container_name: ocidex-nats
        restart: unless-stopped
        command: ["-js"]
        ports:
            - "4222:4222"

    zot:
        image: ghcr.io/project-zot/zot:v2.1.15
        container_name: ocidex-zot
        restart: unless-stopped
        ports:
            - "5000:5000"
        volumes:
            - ./config/zot/config.json:/etc/zot/config.json:ro
            - zot-data:/var/lib/registry
        # healthcheck:
        #     test: ["CMD-SHELL", "wget -qO- http://localhost:5000/v2/ || exit 1"]
        #     interval: 10s
        #     timeout: 5s
        #     retries: 5

    ocidex:
        build:
            context: .
            dockerfile: docker/api/Dockerfile
        container_name: ocidex-app
        restart: unless-stopped
        depends_on:
            postgres:
                condition: service_healthy
            nats:
                condition: service_started
            zot:
                condition: service_started
        environment:
            DATABASE_URL: postgres://ocidex:ocidex@postgres:5432/ocidex?sslmode=disable
            PORT: "8080"
            LOG_LEVEL: info
            ENVIRONMENT: development
            CORS_ALLOWED_ORIGINS: "http://localhost:3000"
            ENRICHMENT_ENABLED: "true"
            ENRICHMENT_WORKERS: "2"
            ENRICHMENT_QUEUE_SIZE: "100"
            NATS_ENABLED: "true"
            NATS_URL: "nats://nats:4222"
            SCANNER_ENABLED: "true"
            ZOT_REGISTRY_ADDR: "zot:5000"
            ZOT_REGISTRY_INSECURE: "true"
            ZOT_WEBHOOK_SECRET: "change-me-in-production"
        env_file:
            - .env
        ports:
            - "8080:8080"

    web:
        build:
            context: .
            dockerfile: docker/web/Dockerfile
        container_name: ocidex-web
        restart: unless-stopped
        depends_on:
            - ocidex
        ports:
            - "3000:3000"

volumes:
    db-data:
    zot-data:
